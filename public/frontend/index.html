<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Collection Manager</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand" data-route="home">
      MTG Collection Manager
    </div>

    <nav class="nav">
      <button type="button" data-route="home">Inicio</button>
      <button type="button" data-route="collections" data-auth-only hidden>Mis colecciones</button>
      <button type="button" data-route="recognition" data-auth-only hidden>Subir foto</button>
      <button type="button" data-route="login" data-guest-only>Inicio de sesión</button>
      <button type="button" id="logoutBtn" data-auth-only hidden>Cerrar sesión</button>
    </nav>
  </header>

  <main id="app" class="app-main"></main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
